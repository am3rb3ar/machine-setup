---
- name: Apply macOS system defaults
  ansible.builtin.import_tasks: defaults.yml

- name: Check if Homebrew is installed
  ansible.builtin.stat:
    path: /opt/homebrew/bin/brew
  register: brew_stat

- name: Install Homebrew
  ansible.builtin.shell: |
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when: not brew_stat.stat.exists

- name: Install Homebrew taps
  community.general.homebrew_tap:
    name: "{{ homebrew_taps }}"
    state: present
  when: homebrew_taps | length > 0

- name: Install Homebrew packages
  community.general.homebrew:
    name: "{{ homebrew_packages }}"
    state: present
  when: homebrew_packages | length > 0

- name: Install Homebrew casks
  community.general.homebrew_cask:
    name: "{{ homebrew_casks }}"
    state: present
    install_options: adopt
  when: homebrew_casks | length > 0

- name: Install Homebrew fonts
  community.general.homebrew_cask:
    name: "{{ homebrew_fonts }}"
    state: present
  when: homebrew_fonts | length > 0
