# Requires manual install + system extension approval in System Settings
# brew install --cask karabiner-elements

macos_dock_defaults:
  - { domain: com.apple.dock, key: autohide,                type: bool,    value: true }
  - { domain: com.apple.dock, key: tilesize,                type: float,   value: 48 }
  - { domain: com.apple.dock, key: magnification,           type: bool,    value: true }
  - { domain: com.apple.dock, key: largesize,               type: float,   value: 80 }
  - { domain: com.apple.dock, key: minimize-to-application, type: bool,    value: false }
  - { domain: com.apple.dock, key: show-recents,            type: bool,    value: false }
  - { domain: com.apple.dock, key: showhidden,              type: bool,    value: true }
  - { domain: com.apple.dock, key: mru-spaces,              type: bool,    value: false }
  - { domain: com.apple.dock, key: orientation,             type: string,  value: bottom }

macos_keyboard_defaults:
  - { domain: NSGlobalDomain,        key: KeyRepeat,                             type: float,  value: 2 }
  - { domain: NSGlobalDomain,        key: InitialKeyRepeat,                      type: float,  value: 15 }
  - { domain: NSGlobalDomain,        key: ApplePressAndHoldEnabled,              type: bool,   value: false }
  - { domain: NSGlobalDomain,        key: NSAutomaticQuoteSubstitutionEnabled,   type: bool,   value: false }
  - { domain: NSGlobalDomain,        key: NSAutomaticDashSubstitutionEnabled,    type: bool,   value: false }
  - { domain: NSGlobalDomain,        key: NSAutomaticCapitalizationEnabled,      type: bool,   value: false }
  - { domain: NSGlobalDomain,        key: NSAutomaticSpellingCorrectionEnabled,  type: bool,   value: false }
  - { domain: NSGlobalDomain,        key: WebAutomaticSpellingCorrectionEnabled, type: bool,   value: false }
  - { domain: com.apple.HIToolbox,   key: AppleCurrentKeyboardLayoutInputSourceID, type: string, value: "com.apple.keylayout.Dvorak" }

